name: health-check

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: brew audit (live formula)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: brew audit
        run: brew audit --strict --online siropkin/budi/budi

  install:
    name: brew install smoke test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: brew install
        run: brew install --formula siropkin/budi/budi

      - name: brew test
        run: brew test siropkin/budi/budi

  report:
    name: open issue on failure
    needs: [audit, install]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = 'formula-broken';
            const title = 'health-check: live formula install failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The weekly health-check workflow failed.',
              '',
              `Run: ${runUrl}`,
              '',
              'This usually means a release tarball was deleted, retagged, or its sha256 changed.',
              'Inspect the failed job logs and the upstream release in `siropkin/budi`.',
            ].join('\n');

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'd73a4a',
                  description: 'Live formula on the tap is broken (404, sha mismatch, install failure).',
                });
              } else {
                throw e;
              }
            }

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Another health-check run failed.\n\nRun: ${runUrl}`,
              });
              core.notice(`Commented on existing issue #${issue.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: [label],
            });
            core.notice(`Opened issue #${created.data.number}`);
