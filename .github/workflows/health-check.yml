name: health-check

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: health-check-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  audit:
    name: brew audit (live formula)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-tap

      - name: brew audit
        run: brew audit --strict --online siropkin/budi/budi

  install:
    name: brew install smoke test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-tap

      - name: brew install
        run: brew install --formula siropkin/budi/budi

      - name: version parity (budi vs budi-daemon)
        shell: bash
        run: |
          set -euo pipefail
          # Both binaries must end up on PATH and report the same version.
          # Skew between them breaks the daemon auto-restart contract (see SOUL.md).
          command -v budi
          command -v budi-daemon
          budi_v="$(budi --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.]+)*' | head -n1)"
          daemon_v="$(budi-daemon --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.]+)*' | head -n1)"
          echo "budi:        ${budi_v}"
          echo "budi-daemon: ${daemon_v}"
          if [ -z "${budi_v}" ] || [ -z "${daemon_v}" ]; then
            echo "::error::could not parse a version from --version output"
            exit 1
          fi
          if [ "${budi_v}" != "${daemon_v}" ]; then
            echo "::error::version mismatch: budi=${budi_v} budi-daemon=${daemon_v}"
            exit 1
          fi

      - name: brew test
        run: brew test siropkin/budi/budi

  report:
    name: open issue on failure
    needs: [audit, install]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const label = 'formula-broken';
            const title = 'health-check: live formula install failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The weekly health-check workflow failed.',
              '',
              `Run: ${runUrl}`,
              '',
              'This usually means a release tarball was deleted, retagged, or its sha256 changed.',
              'Inspect the failed job logs and the upstream release in `siropkin/budi`.',
            ].join('\n');

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'd73a4a',
                  description: 'Live formula on the tap is broken (404, sha mismatch, install failure).',
                });
              } else {
                throw e;
              }
            }

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Another health-check run failed.\n\nRun: ${runUrl}`,
              });
              core.notice(`Commented on existing issue #${issue.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: [label],
            });
            core.notice(`Opened issue #${created.data.number}`);
