name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  style:
    name: brew style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap this repo
        run: brew tap siropkin/budi "$GITHUB_WORKSPACE"

      - name: brew style
        run: brew style siropkin/budi/budi

  audit:
    name: brew audit (--strict --online)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap this repo
        run: brew tap siropkin/budi "$GITHUB_WORKSPACE"

      - name: brew audit
        run: brew audit --strict --online siropkin/budi/budi

  install:
    name: brew install smoke test
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap this repo
        run: brew tap siropkin/budi "$GITHUB_WORKSPACE"

      - name: brew install
        run: brew install --formula siropkin/budi/budi

      - name: brew test
        run: brew test siropkin/budi/budi
